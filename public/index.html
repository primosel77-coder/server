<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AllWhite V5.1</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #ff4d4d; --dark-red: #8b0000; --bg: #050505; --panel: rgba(15, 15, 15, 0.95); }
        * { box-sizing: border-box; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; }

        /* Размытые сферы как в регистрации */
        .blur-sphere { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; pointer-events: none; z-index: 0; animation: pulse 8s infinite alternate; }
        .sphere-1 { width: 400px; height: 400px; background: var(--dark-red); top: -10%; left: -10%; }
        .sphere-2 { width: 500px; height: 500px; background: #ff2a2a; bottom: -10%; right: -10%; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.15; } to { transform: scale(1.2); opacity: 0.25; } }

        /* Авторизация */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-box { position: relative; z-index: 2; background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(30px); padding: 40px; border-radius: 30px; width: 90%; max-width: 360px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .main-logo { font-size: 80px; font-weight: 900; color: transparent; -webkit-text-stroke: 2px #fff; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); }
        
        input { width: 100%; padding: 14px; margin: 8px 0; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; outline: none; }
        .btn-main { width: 100%; padding: 14px; background: var(--dark-red); border: none; color: #fff; cursor: pointer; border-radius: 12px; font-weight: 600; margin-top: 10px; }

        /* Интерфейс */
        .sidebar { width: 320px; background: #080808; border-right: 1px solid #151515; display: flex; flex-direction: column; z-index: 10; position: relative; }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: #030303; }
        
        /* Затемнение фона чата (оверлей поверх сфер) */
        .chat-overlay { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent, #000 90%); pointer-events: none; z-index: 1; }

        .chat-header { padding: 15px 20px; border-bottom: 1px solid #151515; display: flex; align-items: center; gap: 15px; background: rgba(10,10,10,0.8); backdrop-filter: blur(15px); z-index: 5; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 2; }
        
        /* Сообщения */
        .msg-wrapper { max-width: 75%; display: flex; flex-direction: column; }
        .sent-wrap { align-self: flex-end; } .rec-wrap { align-self: flex-start; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .sent { background: var(--dark-red); border-bottom-right-radius: 4px; }
        .received { background: #181818; border-bottom-left-radius: 4px; }
        .msg-info { font-size: 10px; opacity: 0.5; margin-top: 4px; text-align: right; }

        /* Ввод */
        .input-box { padding: 15px 20px; background: rgba(10,10,10,0.95); display: flex; gap: 10px; align-items: center; border-top: 1px solid #151515; z-index: 5; }
        .circle-btn { min-width: 45px; height: 45px; border-radius: 50%; background: #1a1a1a; border: none; color: #fff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .circle-btn.rec { background: #ff4d4d; animation: pulse-rec 1s infinite; }
        @keyframes pulse-rec { 0% { box-shadow: 0 0 0 0 rgba(255,77,77,0.4); } 70% { box-shadow: 0 0 0 10px rgba(255,77,77,0); } 100% { box-shadow: 0 0 0 0 rgba(255,77,77,0); } }

        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; transition: 0.3s; }
            .sidebar.hidden { transform: translateX(-100%); }
        }
    </style>
</head>
<body>
    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <div id="auth-screen">
        <div class="blur-sphere sphere-1"></div>
        <div class="blur-sphere sphere-2"></div>
        <div class="auth-box">
            <div class="main-logo">AW</div>
            <input type="text" id="auth-n" placeholder="Логин">
            <input type="password" id="auth-p" placeholder="Пароль">
            <button class="btn-main" onclick="login()">Войти</button>
            <button class="btn-main" onclick="register()" style="background:transparent; border: 1px solid #333">Создать аккаунт</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="padding:20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #1a1a1a" onclick="openProfile()">
            <img id="my-av" src="" style="width:45px; height:45px; border-radius:12px; object-fit:cover; background:#222">
            <b id="my-name">Загрузка...</b>
        </div>
        
        <div style="padding:15px; display:flex; gap:10px; border-bottom: 1px solid #151515">
            <input type="text" id="f-search" placeholder="Ник друга..." style="margin:0; font-size: 13px;">
            <button onclick="addFriend()" class="circle-btn" style="min-width:40px; height:40px">+</button>
        </div>

        <div id="friend-list" style="flex:1; overflow-y:auto"></div>
    </div>

    <div class="chat-area">
        <div class="blur-sphere sphere-1"></div>
        <div class="blur-sphere sphere-2" style="background: #440000"></div>
        <div class="chat-overlay"></div>

        <div class="chat-header">
            <button onclick="document.getElementById('sidebar').classList.remove('hidden')" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer">❮</button>
            <b id="chat-h">Выберите диалог</b>
        <div style="display: flex; flex-direction: column;">
    <b id="chat-h">Выберите диалог</b>
    <span id="typing-status" style="font-size: 11px; color: var(--red); opacity: 0.8; height: 14px;"></span>             
</div>
    </div>

    <script>
        const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });
        let me = "", selectedFriend = "", friends = [], chatHistory = [];
        let mediaRecorder, audioChunks = [], isRecording = false;

        function login() {
            const u = document.getElementById('auth-n').value, p = document.getElementById('auth-p').value;
            if(!u || !p) return alert("Введите данные!");
            localStorage.setItem('aw_n', u); localStorage.setItem('aw_p', p);
            socket.emit('login', { username: u, password: p });
        }
        
        function register() { 
            const u = document.getElementById('auth-n').value, p = document.getElementById('auth-p').value;
            if(!u || !p) return alert("Заполни поля!");
            socket.emit('register', { username: u, password: p }); 
        }

        window.onload = () => {
            const n = localStorage.getItem('aw_n'), p = localStorage.getItem('aw_p');
            if(n && p) socket.emit('login', { username: n, password: p });
        };

        socket.on('register_success', () => alert("Аккаунт успешно создан! Теперь войдите."));
        socket.on('auth_error', e => alert(e));

        socket.on('login_success', data => {
            me = data.username; 
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('my-name').innerText = me;
            document.getElementById('my-av').src = data.avatar;
            friends = data.friends; 
            chatHistory = data.history; 
            renderFriends();
        });

        function addFriend() {
            const n = document.getElementById('f-search').value;
            if(n) { socket.emit('add_friend', n); document.getElementById('f-search').value = ""; }
        }

        socket.on('friend_added', f => { 
            friends.push(f); 
            renderFriends(); 
            alert(`Пользователь ${f.name} добавлен в друзья!`);
        });

        function renderFriends() {
            const list = document.getElementById('friend-list'); list.innerHTML = "";
            friends.forEach(f => {
                const d = document.createElement('div');
                d.style = "padding:15px 20px; display:flex; align-items:center; gap:12px; cursor:pointer; border-bottom:1px solid #111; position:relative; z-index:2";
                d.innerHTML = `<img src="${f.avatar}" style="width:40px;height:40px;border-radius:10px; object-fit:cover"> <b>${f.name}</b> <span style="color:${f.online?'#2ecc71':'#555'}; margin-left:auto">●</span>`;
                d.onclick = () => {
                    selectedFriend = f.name; 
                    document.getElementById('chat-h').innerText = f.name;
                    document.getElementById('inp-box').style.display = 'flex';
                    if(window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hidden');
                    renderMessages();
                };
                list.appendChild(d);
            });
        }

        function sendMsg() {
            const i = document.getElementById('m-i');
            if(i.value && selectedFriend) { 
                socket.emit('private_message', { to: selectedFriend, text: i.value, type: 'text' }); 
                i.value = ""; 
            }
        }

        socket.on('private_message', m => {
            chatHistory.push(m);
            if(m.to === me) document.getElementById('msg-sound').play();
            if(selectedFriend === m.from || selectedFriend === m.to) renderMessages();
        });

        function renderMessages() {
            const box = document.getElementById('messages'); box.innerHTML = "";
            chatHistory.filter(m => (m.from===me && m.to===selectedFriend) || (m.from===selectedFriend && m.to===me)).forEach(m => {
                const w = document.createElement('div'); w.className = `msg-wrapper ${m.from===me?'sent-wrap':'rec-wrap'}`;
                let content = m.type === 'voice' ? `<audio controls src="${m.fileData}" style="height:35px; width:200px"></audio>` : m.text;
                w.innerHTML = `<div class="msg ${m.from===me?'sent':'received'}">${content}</div><div class="msg-info"><span>${m.time}</span></div>`;
                box.appendChild(w);
            });
            box.scrollTo(0, box.scrollHeight);
        }

        async function toggleMic() {
            const btn = document.getElementById('mic-btn');
            if(!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
                    mediaRecorder = new MediaRecorder(stream, { mimeType });
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: mimeType });
                        const reader = new FileReader();
                        reader.onload = e => socket.emit('private_message', { to: selectedFriend, text: "Голосовое", fileData: e.target.result, type: 'voice' });
                        reader.readAsDataURL(blob);
                        audioChunks = [];
                        stream.getTracks().forEach(t => t.stop());
                    };
                    mediaRecorder.start();
                    isRecording = true; btn.classList.add('rec');
                } catch(err) { alert("Микрофон недоступен!"); }
            } else {
                mediaRecorder.stop(); isRecording = false; btn.classList.remove('rec');
            }
        }

        document.getElementById('m-i').addEventListener('keypress', e => { if(e.key==='Enter') sendMsg(); });
    </script>
</body>
</html>
