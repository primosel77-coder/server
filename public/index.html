<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AllWhite V5.4</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #ff4d4d; --dark-red: #8b0000; --bg: #050505; --panel: #0a0a0a; }
        * { box-sizing: border-box; transition: transform 0.3s ease, opacity 0.2s; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; position: relative; }

        /* Живой фон */
        .blur-sphere { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; z-index: 0; animation: pulse 8s infinite alternate; }
        .sphere-1 { width: 300px; height: 300px; background: var(--dark-red); top: -50px; left: -50px; }
        .sphere-2 { width: 400px; height: 400px; background: #ff2a2a; bottom: -50px; right: -50px; animation-delay: -4s; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.12; } to { transform: scale(1.2); opacity: 0.22; } }

        /* Вход */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-box { position: relative; z-index: 2; background: rgba(15,15,15,0.7); backdrop-filter: blur(20px); padding: 30px; border-radius: 25px; width: 85%; max-width: 340px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .main-logo { font-size: 60px; font-weight: 900; color: transparent; -webkit-text-stroke: 1.5px #fff; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 6px 0; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 10px; outline: none; font-size: 14px; }
        .btn-main { width: 100%; padding: 12px; background: var(--dark-red); border: none; color: #fff; cursor: pointer; border-radius: 10px; font-weight: 600; margin-top: 8px; }

        /* Структура интерфейса */
        .sidebar { width: 320px; background: var(--panel); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; z-index: 100; position: relative; flex-shrink: 0; }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: #030303; z-index: 10; }
        .chat-overlay { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent, #000 98%); pointer-events: none; z-index: 1; }

        /* Шапка и Сообщения */
        .chat-header { padding: 12px 18px; border-bottom: 1px solid #151515; display: flex; align-items: center; gap: 12px; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); z-index: 5; height: 60px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 2; padding-bottom: 80px; }
        
        .msg-wrapper { max-width: 85%; display: flex; flex-direction: column; }
        .sent-wrap { align-self: flex-end; } .rec-wrap { align-self: flex-start; }
        .msg { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.4; box-shadow: 0 3px 10px rgba(0,0,0,0.2); }
        .sent { background: var(--dark-red); border-bottom-right-radius: 2px; }
        .received { background: #1a1a1a; border-bottom-left-radius: 2px; }
        .msg-info { font-size: 9px; opacity: 0.5; margin-top: 3px; display: flex; justify-content: flex-end; align-items: center; gap: 5px; }

        /* Поле ввода */
        .input-box { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 15px; background: rgba(10,10,10,0.95); display: flex; gap: 8px; align-items: center; border-top: 1px solid #1a1a1a; z-index: 20; }
        .circle-btn { width: 40px; height: 40px; border-radius: 50%; background: #1a1a1a; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .sidebar { position: absolute; width: 100%; height: 100%; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
            .sidebar.hidden { transform: translateX(-100%); }
            .chat-area { width: 100%; }
            .back-btn { display: block !important; }
        }

        .back-btn { display: none; background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 0 5px; }

        /* Профиль Модалка */
        #profile-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; border: 1px solid #333; }
        .avatar { object-fit: cover; background: #222; }
    </style>
</head>
<body>
    <div class="blur-sphere sphere-1"></div>
    <div class="blur-sphere sphere-2"></div>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="main-logo">AW</div>
            <input type="text" id="auth-n" placeholder="Логин">
            <input type="password" id="auth-p" placeholder="Пароль">
            <button class="btn-main" onclick="login()">Войти</button>
            <button class="btn-main" onclick="register()" style="background:transparent; border: 1px solid #333">Создать аккаунт</button>
        </div>
    </div>

    <div id="profile-modal">
        <div class="modal-content">
            <h3 style="margin:0 0 15px 0">Профиль</h3>
            <img id="modal-av" src="" class="avatar" style="width:90px; height:90px; border-radius:15px; margin-bottom:10px">
            <input type="file" id="av-upload" style="display:none" onchange="uploadAvatar(this)" accept="image/*">
            <button class="btn-main" onclick="document.getElementById('av-upload').click()" style="background:#222; margin-bottom:10px">Выбрать фото</button>
            <input type="text" id="newName-input" placeholder="Новый ник">
            <input type="text" id="bio-input" placeholder="Статус">
            <div style="display:flex; gap:10px; margin-top:15px">
                <button class="btn-main" onclick="saveProfile()" style="margin:0">Ок</button>
                <button class="btn-main" onclick="document.getElementById('profile-modal').style.display='none'" style="margin:0; background:#333">Отмена</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="padding:15px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #1a1a1a; cursor:pointer" onclick="openProfile()">
            <img id="my-av" src="" class="avatar" style="width:45px; height:45px; border-radius:12px">
            <div style="overflow:hidden"><b id="my-name" style="display:block; white-space:nowrap; text-overflow:ellipsis"></b><div id="my-bio" style="font-size:11px;color:#888; white-space:nowrap; text-overflow:ellipsis"></div></div>
        </div>
        <div style="padding:12px; display:flex; gap:8px; border-bottom:1px solid #1a1a1a">
            <input type="text" id="f-search" placeholder="Ник друга..." style="margin:0; font-size:13px">
            <button onclick="addFriend()" class="circle-btn" style="width:38px; height:38px">+</button>
        </div>
        <div id="friend-list" style="overflow-y:auto; flex:1"></div>
    </div>

    <div class="chat-area">
        <div class="chat-overlay"></div>
        <div class="chat-header">
            <button class="back-btn" onclick="goBack()">❮</button>
            <div id="chat-h-box" style="display:none; align-items:center; gap:10px">
                <b id="chat-h">Чат</b>
            </div>
            <b id="chat-placeholder" style="opacity:0.5">Выберите друга</b>
        </div>
        <div id="messages"></div>
        
        <div class="input-box" id="inp-box" style="display:none">
            <button class="circle-btn" onclick="document.getElementById('file-in').click()">📎</button>
            <input type="file" id="file-in" style="display:none" onchange="sendFile(this)">
            <input type="text" id="m-i" placeholder="Сообщение..." style="margin:0; flex:1">
            <button class="circle-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
            <button class="circle-btn" style="background:var(--dark-red)" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });
        let me = "", selectedFriend = "", friends = [], chatHistory = [], mediaRecorder, chunks = [];

        function login() {
            const u = document.getElementById('auth-n').value, p = document.getElementById('auth-p').value;
            if(!u || !p) return alert("Введите данные!");
            localStorage.setItem('aw_n', u); localStorage.setItem('aw_p', p);
            socket.emit('login', { username: u, password: p });
        }
        function register() { socket.emit('register', { username: document.getElementById('auth-n').value, password: document.getElementById('auth-p').value }); }
        
        window.onload = () => {
            const n = localStorage.getItem('aw_n'), p = localStorage.getItem('aw_p');
            if(n && p) socket.emit('login', { username: n, password: p });
        };

        socket.on('login_success', data => {
            me = data.username; document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('my-name').innerText = me;
            document.getElementById('my-av').src = data.avatar;
            document.getElementById('my-bio').innerText = data.bio;
            friends = data.friends; chatHistory = data.history; renderFriends();
        });
