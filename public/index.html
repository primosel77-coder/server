<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllWhite Final Fix</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* Сайдбар фиксированный, чтобы не "плыл" */
        .sidebar { width: 320px; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; background: #080808; flex-shrink: 0; z-index: 10; }
        .header { height: 70px; padding: 0 20px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 15px; background: #0a0a0a; }
        
        /* Чат зона */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #050505; position: relative; min-width: 0; }
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Сообщения */
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .sent { background: #8b0000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .received { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Ввод */
        .input-box { padding: 20px; display: flex; gap: 12px; background: #0a0a0a; border-top: 1px solid #1a1a1a; }
        input { flex: 1; background: #000; border: 1px solid #222; color: #fff; padding: 12px 18px; border-radius: 12px; outline: none; transition: 0.2s; }
        input:focus { border-color: #8b0000; }
        .btn { background: #8b0000; color: #fff; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: 600; }

        /* Мобилка */
        @media (max-width: 768px) {
            .sidebar { position: absolute; width: 100%; height: 100%; }
            .sidebar.hidden { display: none; }
            #back { display: block !important; }
        }
        
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #111; padding: 40px; border-radius: 25px; width: 350px; text-align: center; border: 1px solid #222; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="color:#8b0000; font-size: 45px; margin-bottom: 25px; letter-spacing: -2px;">AW</h1>
            <input id="u" placeholder="Логин">
            <input id="p" type="password" placeholder="Пароль">
            <button class="btn" style="width:100%" onclick="login()">Войти</button>
            <button class="btn" style="width:100%; background:none; margin-top:10px; font-size:13px; color:#666" onclick="reg()">Зарегистрироваться</button>
        </div>
    </div>

    <div class="sidebar" id="sb">
        <div class="header">
            <img id="my-av" style="width:40px; height:40px; border-radius:10px; object-fit: cover;">
            <div><b id="my-n" style="display:block"></b><span style="font-size:10px; color:#2ecc71">Online</span></div>
        </div>
        <div style="padding:15px; display:flex; gap:8px">
            <input id="f-n" placeholder="Добавить друга..." style="margin:0; font-size:13px">
            <button class="btn" onclick="addF()" style="padding:0 15px">+</button>
        </div>
        <div id="f-list" style="overflow-y:auto"></div>
    </div>

    <div class="chat-area">
        <div class="header">
            <button onclick="document.getElementById('sb').classList.remove('hidden')" style="background:none; border:none; color:#8b0000; font-size:22px; cursor:pointer; display:none" id="back">❮</button>
            <b id="c-h" style="font-size:18px">Выберите диалог</b>
        </div>
        <div id="messages"></div>
        <div class="input-box" id="i-b" style="display:none">
            <input id="m" placeholder="Напишите сообщение...">
            <button class="btn" onclick="send()">Отправить</button>
        </div>
    </div>

    <script>
        const socket = io();
        let me = "", cur = "", history = [];

        function login() { socket.emit('login', {username: u.value, password: p.value}); }
        function reg() { socket.emit('register', {username: u.value, password: p.value}); }
        function addF() { if(f_n.value) { socket.emit('add_friend', f_n.value); f_n.value=""; } }

        socket.on('login_success', d => {
            me = d.username; document.getElementById('auth-screen').style.display='none';
            my_n.innerText = me; my_av.src = d.avatar;
            history = d.history; renderF(d.friends);
        });

        function renderF(list) {
            f_list.innerHTML = "";
            list.forEach(f => {
                let div = document.createElement('div');
                div.style = "padding:18px 20px; border-bottom:1px solid #121212; cursor:pointer; display:flex; align-items:center; gap:12px; transition:0.2s";
                div.onmouseover = () => div.style.background = "#0f0f0f";
                div.onmouseout = () => div.style.background = "transparent";
                div.innerHTML = `<img src="${f.avatar}" style="width:40px;height:40px;border-radius:10px"> <b>${f.name}</b>`;
                div.onclick = () => {
                    cur = f.name; c_h.innerText = cur; i_b.style.display='flex';
                    if(window.innerWidth <= 768) { sb.classList.add('hidden'); back.style.display='block'; }
                    renderM();
                };
                f_list.appendChild(div);
            });
        }

        function send() { if(m.value && cur) { socket.emit('private_message', {to:cur, text:m.value, type:'text'}); m.value=""; } }
        
        socket.on('private_message', msg => {
            history.push(msg);
            if(cur === msg.from || cur === msg.to) renderM();
        });

        function renderM() {
            messages.innerHTML = "";
            history.filter(m => (m.from===me && m.to===cur) || (m.from===cur && m.to===me)).forEach(m => {
                let d = document.createElement('div');
                d.className = `msg ${m.from===me?'sent':'received'}`;
                d.innerText = m.text;
                messages.appendChild(d);
            });
            messages.scrollTo(0, messages.scrollHeight);
        }

        socket.on('auth_error', e => alert(e));
        socket.on('register_success', () => alert("Аккаунт готов!"));
    </script>
</body>
</html>
