<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AllWhite V4</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #ff4d4d; --dark-red: #8b0000; --bg: #050505; --panel: rgba(20, 20, 20, 0.95); }
        * { box-sizing: border-box; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--dark-red); border-radius: 10px; }

        /* Авторизация */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-box { background: var(--panel); padding: 40px; border-radius: 24px; width: 90%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; outline: none; }
        input:focus { border-color: var(--red); }
        .btn-main { width: 100%; padding: 14px; background: var(--dark-red); border: none; color: #fff; cursor: pointer; border-radius: 12px; font-weight: 600; font-size: 16px; margin-top: 10px; }

        /* Лейаут */
        .sidebar { width: 320px; background: #0a0a0a; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; z-index: 10; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #050505; position: relative; }
        
        /* Профиль */
        .my-profile { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .my-profile:hover { background: rgba(255,255,255,0.05); }
        .avatar { width: 50px; height: 50px; border-radius: 16px; object-fit: cover; }
        
        /* Друзья */
        .friend-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; position: relative; }
        .friend-item:hover { background: rgba(255,255,255,0.03); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #000; position: absolute; left: 55px; top: 50px; }

        /* Чат */
        .chat-header { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 15px; background: var(--panel); backdrop-filter: blur(10px); z-index: 5; }
        .back-btn { display: none; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 0; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-wrapper { display: flex; flex-direction: column; position: relative; max-width: 75%; }
        .sent-wrap { align-self: flex-end; } .rec-wrap { align-self: flex-start; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; word-wrap: break-word; }
        .sent { background: var(--dark-red); border-bottom-right-radius: 4px; }
        .received { background: #1a1a1a; border-bottom-left-radius: 4px; }
        
        .msg-info { display: flex; justify-content: flex-end; gap: 10px; font-size: 10px; opacity: 0.6; margin-top: 4px; }
        .del-btn { cursor: pointer; color: #ff4d4d; }
        .del-btn:hover { text-decoration: underline; }

        audio { height: 40px; border-radius: 20px; outline: none; max-width: 200px; }

        /* Ввод */
        .input-box { padding: 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        .circle-btn { min-width: 45px; height: 45px; border-radius: 50%; background: #222; border: none; color: #fff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .circle-btn.send { background: var(--dark-red); }
        .circle-btn.rec { background: #ff4d4d; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Модалка профиля */
        #profile-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; transition: transform 0.3s; }
            .chat-area { width: 100%; position: absolute; height: 100%; }
            .sidebar.hidden { transform: translateX(-100%); }
            .back-btn { display: block; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="color:var(--red); margin: 0 0 30px 0;">AllWhite</h1>
            <input type="text" id="auth-n" placeholder="Логин">
            <input type="password" id="auth-p" placeholder="Пароль">
            <button class="btn-main" onclick="login()">Войти</button>
            <button class="btn-main" onclick="register()" style="background:transparent; border: 1px solid #333;">Создать аккаунт</button>
        </div>
    </div>

    <div id="profile-modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Настройки профиля</h3>
            <img id="modal-av" src="" class="avatar" style="width:80px; height:80px; margin-bottom:15px; border-radius:50%">
            <input type="file" id="av-upload" style="display:none" onchange="uploadAvatar(this)" accept="image/*">
            <button class="btn-main" onclick="document.getElementById('av-upload').click()" style="background:#222; margin-bottom:10px">Изменить фото</button>
            <input type="text" id="bio-input" placeholder="Ваш статус...">
            <div style="display:flex; gap:10px; margin-top:20px">
                <button class="btn-main" onclick="saveProfile()" style="margin:0">Сохранить</button>
                <button class="btn-main" onclick="document.getElementById('profile-modal').style.display='none'" style="margin:0; background:#333">Отмена</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="my-profile" onclick="openProfile()">
            <img id="my-av" src="" class="avatar">
            <div>
                <b id="my-name" style="font-size:18px"></b>
                <div id="my-bio" style="font-size:12px; color:#aaa; margin-top:4px"></div>
            </div>
        </div>
        <div style="padding:15px; display:flex; gap:10px; border-bottom: 1px solid #222">
            <input type="text" id="f-search" placeholder="Ник друга..." style="margin:0">
            <button onclick="addFriend()" class="circle-btn" style="min-width:45px">+</button>
        </div>
        <div id="friend-list" style="overflow-y:auto; flex:1"></div>
    </div>

    <div class="chat-area" id="chat-area">
        <div class="chat-header">
            <button class="back-btn" onclick="goBack()">❮</button>
            <img id="chat-av" src="https://ui-avatars.com/api/?name=?&background=000" class="avatar" style="width:40px;height:40px; display:none">
            <div>
                <b id="chat-h">Выберите диалог</b>
                <div id="chat-bio" style="font-size:12px; color:#aaa"></div>
            </div>
        </div>
        <div id="messages"></div>
        <div class="input-box" id="inp-box" style="display:none">
            <button class="circle-btn" onclick="document.getElementById('file-in').click()">📎</button>
            <input type="file" id="file-in" style="display:none" onchange="sendFile(this)">
            <input type="text" id="m-i" placeholder="Сообщение..." style="margin:0">
            <button class="circle-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
            <button class="circle-btn send" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });
        let me = "", selectedFriend = "", friends = [], chatHistory = [];
        let mediaRecorder, audioChunks = [], isRecording = false;

        window.onload = () => {
            const n = localStorage.getItem('aw_n'), p = localStorage.getItem('aw_p');
            if(n && p) socket.emit('login', { username: n, password: p });
            if(window.innerWidth <= 768) goBack(); // На мобиле сначала показываем друзей
        };

        // --- АВТОРИЗАЦИЯ ---
        function login() {
            const u = document.getElementById('auth-n').value, p = document.getElementById('auth-p').value;
            if(!u || !p) return alert("Заполни поля!");
            localStorage.setItem('aw_n', u); localStorage.setItem('aw_p', p);
            socket.emit('login', { username: u, password: p });
        }
        function register() { socket.emit('register', { username: document.getElementById('auth-n').value, password: document.getElementById('auth-p').value }); }

        socket.on('login_success', data => {
            me = data.username; document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('my-name').innerText = me;
            document.getElementById('my-av').src = data.avatar;
            document.getElementById('my-bio').innerText = data.bio;
            friends = data.friends; renderFriends();
        });

        // --- ПРОФИЛЬ ---
        let tempAvatar = "";
        function openProfile() {
            document.getElementById('profile-modal').style.display = 'flex';
            document.getElementById('modal-av').src = document.getElementById('my-av').src;
            document.getElementById('bio-input').value = document.getElementById('my-bio').innerText;
            tempAvatar = "";
        }
        function uploadAvatar(input) {
            const file = input.files[0];
            if(file) {
                if(file.size > 2*1024*1024) return alert("Аватарка до 2МБ!");
                const reader = new FileReader();
                reader.onload = e => { tempAvatar = e.target.result; document.getElementById('modal-av').src = tempAvatar; };
                reader.readAsDataURL(file);
            }
        }
        function saveProfile() {
            const bio = document.getElementById('bio-input').value;
            socket.emit('update_profile', { avatar: tempAvatar || undefined, bio });
            document.getElementById('profile-modal').style.display = 'none';
        }
        socket.on('profile_updated', data => {
            if(data.avatar) document.getElementById('my-av').src = data.avatar;
            document.getElementById('my-bio').innerText = data.bio;
        });

        // --- ДРУЗЬЯ И МОБИЛЬНОСТЬ ---
        function addFriend() { const n = document.getElementById('f-search').value; if(n) socket.emit('add_friend', n); }
        socket.on('friend_added', f => { friends.push(f); renderFriends(); });
        socket.on('friend_updated', data => {
            const f = friends.find(u => u.name === data.name);
            if(f) { f.online = data.online; if(data.avatar) f.avatar = data.avatar; if(data.bio) f.bio = data.bio; renderFriends(); }
        });

        function renderFriends() {
            const list = document.getElementById('friend-list'); list.innerHTML = "";
            friends.forEach(f => {
                const d = document.createElement('div'); d.className = `friend-item`;
                d.innerHTML = `<img src="${f.avatar}" class="avatar"><div class="status-dot" style="background:${f.online?'#2ecc71':'#555'}"></div><div><b>${f.name}</b><div style="font-size:12px;color:#aaa">${f.bio||''}</div></div>`;
                d.onclick = () => openChat(f);
                list.appendChild(d);
            });
        }

        function openChat(f) {
            selectedFriend = f.name; 
            document.getElementById('chat-h').innerText = f.name;
            document.getElementById('chat-bio').innerText = f.online ? 'В сети' : 'Был(а) недавно';
            document.getElementById('chat-av').src = f.avatar;
            document.getElementById('chat-av').style.display = 'block';
            document.getElementById('inp-box').style.display = 'flex';
            if(window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hidden');
            renderMessages();
        }
        function goBack() { document.getElementById('sidebar').classList.remove('hidden'); }

        // --- СООБЩЕНИЯ, ФАЙЛЫ И УДАЛЕНИЕ ---
        function sendMsg() {
            const i = document.getElementById('m-i');
            if(i.value && selectedFriend) { socket.emit('private_message', { to: selectedFriend, text: i.value, type: 'text' }); i.value = ""; }
        }
        function sendFile(input) {
            const file = input.files[0];
            if(!file || !selectedFriend) return;
            const reader = new FileReader();
            reader.onload = e => socket.emit('private_message', { to: selectedFriend, text: file.name, fileData: e.target.result, type: 'file' });
            reader.readAsDataURL(file);
        }
        function deleteMsg(id) { if(confirm("Удалить у всех?")) socket.emit('delete_message', { msgId: id, to: selectedFriend }); }

        socket.on('private_message', m => { chatHistory.push(m); renderMessages(); });
        socket.on('message_deleted', id => { chatHistory = chatHistory.filter(m => m.id !== id); renderMessages(); });

        function renderMessages() {
            const box = document.getElementById('messages'); box.innerHTML = "";
            chatHistory.filter(m => (m.from===me && m.to===selectedFriend) || (m.from===selectedFriend && m.to===me)).forEach(m => {
                const w = document.createElement('div'); w.className = `msg-wrapper ${m.from===me?'sent-wrap':'rec-wrap'}`;
                
                let content = m.text;
                if(m.type === 'file') content = `<a href="${m.fileData}" download="${m.text}" style="color:#fff">📁 Скачать: ${m.text}</a>`;
                if(m.type === 'voice') content = `<audio controls src="${m.fileData}"></audio>`;

                w.innerHTML = `
                    <div class="msg ${m.from===me?'sent':'received'}">${content}</div>
                    <div class="msg-info">
                        <span>${m.time}</span>
                        ${m.from===me ? `<span class="del-btn" onclick="deleteMsg('${m.id}')">Удалить</span>` : ''}
                    </div>
                `;
                box.appendChild(w);
            });
            box.scrollTo(0, box.scrollHeight);
        }

        // --- ГОЛОСОВЫЕ СООБЩЕНИЯ ---
        async function toggleMic() {
            const btn = document.getElementById('mic-btn');
            if(!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = e => socket.emit('private_message', { to: selectedFriend, text: "Голосовое сообщение", fileData: e.target.result, type: 'voice' });
                        reader.readAsDataURL(blob);
                        audioChunks = [];
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    btn.classList.add('rec');
                } catch(err) { alert("Нет доступа к микрофону!"); }
            } else {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(t => t.stop());
                isRecording = false;
                btn.classList.remove('rec');
            }
        }

        socket.on('auth_error', e => alert(e));
        socket.on('register_success', () => alert("Аккаунт создан!"));
        document.getElementById('m-i').addEventListener('keypress', e => { if(e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
