<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AllWhite V5.3 - FULL</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #ff4d4d; --dark-red: #8b0000; --bg: #050505; --panel: rgba(20, 20, 20, 0.95); }
        * { box-sizing: border-box; transition: 0.2s; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; }

        /* Фоновый дизайн (сферы) */
        .blur-sphere { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; pointer-events: none; z-index: 0; animation: pulse 8s infinite alternate; }
        .sphere-1 { width: 350px; height: 350px; background: var(--dark-red); top: 10%; left: 10%; }
        .sphere-2 { width: 450px; height: 450px; background: #ff2a2a; bottom: 10%; right: 10%; animation-delay: -4s; }
        @keyframes pulse { from { opacity: 0.15; } to { opacity: 0.25; } }

        /* Вход */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-box { position: relative; z-index: 2; background: rgba(10,10,10,0.6); backdrop-filter: blur(25px); padding: 40px; border-radius: 30px; width: 90%; max-width: 360px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .main-logo { font-size: 80px; font-weight: 900; color: transparent; -webkit-text-stroke: 2px #fff; filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 8px 0; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; outline: none; }
        .btn-main { width: 100%; padding: 14px; background: var(--dark-red); border: none; color: #fff; cursor: pointer; border-radius: 12px; font-weight: 600; margin-top: 10px; }

        /* Главный интерфейс */
        .sidebar { width: 320px; background: #0a0a0a; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; z-index: 10; }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: #050505; }
        .chat-overlay { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent, #000 95%); pointer-events: none; z-index: 1; }

        .chat-header { padding: 15px 20px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 15px; background: var(--panel); backdrop-filter: blur(10px); z-index: 5; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 2; }
        .msg-wrapper { max-width: 75%; display: flex; flex-direction: column; position: relative; }
        .sent-wrap { align-self: flex-end; } .rec-wrap { align-self: flex-start; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); word-break: break-all; }
        .sent { background: var(--dark-red); border-bottom-right-radius: 4px; }
        .received { background: #1a1a1a; border-bottom-left-radius: 4px; }
        .msg-info { font-size: 10px; opacity: 0.5; margin-top: 4px; text-align: right; }
        .del-btn { color: #ff4d4d; cursor: pointer; margin-left: 8px; }

        /* Ввод и модалка профиля */
        .input-box { padding: 15px 20px; background: rgba(15,15,15,0.95); display: flex; gap: 10px; align-items: center; border-top: 1px solid #1a1a1a; z-index: 5; }
        .circle-btn { min-width: 45px; height: 45px; border-radius: 50%; background: #1a1a1a; border: none; color: #fff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        #profile-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #333; }
        .avatar { object-fit: cover; }
    </style>
</head>
<body>
    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <div id="auth-screen">
        <div class="blur-sphere sphere-1"></div>
        <div class="auth-box">
            <div class="main-logo">AW</div>
            <input type="text" id="auth-n" placeholder="Логин">
            <input type="password" id="auth-p" placeholder="Пароль">
            <button class="btn-main" onclick="login()">Войти</button>
            <button class="btn-main" onclick="register()" style="background:transparent; border: 1px solid rgba(255,255,255,0.1)">Регистрация</button>
        </div>
    </div>

    <div id="profile-modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Мой Профиль</h3>
            <img id="modal-av" src="" class="avatar" style="width:100px; height:100px; border-radius:15px; margin-bottom:15px">
            <input type="file" id="av-upload" style="display:none" onchange="uploadAvatar(this)" accept="image/*">
            <button class="btn-main" onclick="document.getElementById('av-upload').click()" style="background:#222; font-size: 12px">Изменить фото</button>
            <input type="text" id="newName-input" placeholder="Имя пользователя...">
            <input type="text" id="bio-input" placeholder="Статус (био)...">
            <div style="display:flex; gap:10px; margin-top:20px">
                <button class="btn-main" onclick="saveProfile()" style="margin:0">Сохранить</button>
                <button class="btn-main" onclick="document.getElementById('profile-modal').style.display='none'" style="margin:0; background:#333">Отмена</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="padding:20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #1a1a1a; cursor:pointer" onclick="openProfile()">
            <img id="my-av" src="" class="avatar" style="width:45px; height:45px; border-radius:12px">
            <div><b id="my-name"></b><div id="my-bio" style="font-size:12px;color:#aaa"></div></div>
        </div>
        <div style="padding:15px; display:flex; gap:10px; border-bottom:1px solid #1a1a1a">
            <input type="text" id="f-search" placeholder="Добавить друга..." style="margin:0">
            <button onclick="addFriend()" class="circle-btn" style="min-width:40px; height:40px">+</button>
        </div>
        <div id="friend-list" style="overflow-y:auto; flex:1"></div>
    </div>

    <div class="chat-area">
        <div class="blur-sphere sphere-1"></div>
        <div class="blur-sphere sphere-2" style="background: #440000"></div>
        <div class="chat-overlay"></div>
        <div class="chat-header">
            <button onclick="document.getElementById('sidebar').classList.remove('hidden')" style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer">❮</button>
            <b id="chat-h">Выберите диалог</b>
        </div>
        <div id="messages"></div>
        <div class="input-box" id="inp-box" style="display:none">
            <button class="circle-btn" onclick="document.getElementById('file-in').click()">📎</button>
            <input type="file" id="file-in" style="display:none; outline:none" onchange="sendFile(this)" accept="image/*,video/*,application/*">
            <input type="text" id="m-i" placeholder="Сообщение..." style="margin:0; flex:1">
            <button class="circle-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
            <button class="circle-btn" style="background:var(--dark-red)" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });
        let me = "", selectedFriend = "", friends = [], chatHistory = [], mediaRecorder, audioChunks = [];

        window.onload = () => {
            const n = localStorage.getItem('aw_n'), p = localStorage.getItem('aw_p');
            if(n && p) socket.emit('login', { username: n, password: p });
            if(window.innerWidth > 768) goBack(); 
        };

        function login() {
            const u = document.getElementById('auth-n').value, p = document.getElementById('auth-p').value;
            if(!u || !p) return alert("Заполни поля!");
            localStorage.setItem('aw_n', u); localStorage.setItem('aw_p', p);
            socket.emit('login', { username: u, password: p });
        }
        function register() { socket.emit('register', { username: document.getElementById('auth-n').value, password: document.getElementById('auth-p').value }); }
        
        socket.on('login_success', data => {
            me = data.username; document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('my-name').innerText = me;
            document.getElementById('my-av').src = data.avatar;
            document.getElementById('my-bio').innerText = data.bio;
            friends = data.friends; chatHistory = data.history; renderFriends();
        });

        let tempAv = "";
        function openProfile() {
            document.getElementById('profile-modal').style.display = 'flex';
            document.getElementById('modal-av').src = document.getElementById('my-av').src;
            document.getElementById('newName-input').value = me;
            document.getElementById('bio-input').value = document.getElementById('my-bio').innerText;
            tempAv = "";
        }
        function uploadAvatar(input) {
            const file = input.files[0];
            if(file && file.size <= 2*1024*1024) {
                const reader = new FileReader();
                reader.onload = e => { tempAv = e.target.result; document.getElementById('modal-av').src = tempAv; };
                reader.readAsDataURL(file);
            } else { alert("Файл должен быть до 2МБ!"); }
        }
        function saveProfile() {
            const newBio = document.getElementById('bio-input').value;
            const newName = document.getElementById('newName-input').value;
            socket.emit('update_profile', { avatar: tempAv || undefined, bio: newBio, newName: newName });
            if(newName && newName !== me) { localStorage.setItem('aw_n', newName); }
            document.getElementById('profile-modal').style.display = 'none';
        }
        socket.on('profile_updated', data => {
            if(data.newName) { me = data.newName; document.getElementById('my-name').innerText = me; }
            if(data.avatar) document.getElementById('my-av').src = data.avatar;
            document.getElementById('my-bio').innerText = data.bio;
        });

        function addFriend() { const n = document.getElementById('f-search').value; if(n) socket.emit('add_friend', n); }
        socket.on('friend_added', f => { friends.push(f); renderFriends(); });
        socket.on('friend_updated', data => {
            if(data.newName) { friends.forEach(f => { if(f.name === data.name) f.name = data.newName; }); }
            const f = friends.find(u => u.name === data.name || u.name === data.newName);
            if(f) { f.online = data.online; if(data.avatar) f.avatar = data.avatar; renderFriends(); }
        });

        function renderFriends() {
            const list = document.getElementById('friend-list'); list.innerHTML = "";
            friends.forEach(f => {
                const d = document.createElement('div'); d.style = "padding:15px 20px; display:flex; align-items:center; gap:12px; cursor:pointer; border-bottom:1px solid #111; position:relative; z-index:2";
                d.innerHTML = `<img src="${f.avatar}" class="avatar" style="width:40px;height:40px;border-radius:10px"> <b>${f.name}</b> <span style="color:${f.online?'#2ecc71':'#555'}; margin-left:auto">●</span>`;
                d.onclick = () => {
                    selectedFriend = f.name; document.getElementById('chat-h').innerText = f.name;
                    document.getElementById('inp-box').style.display = 'flex';
                    if(window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hidden');
                    renderMessages();
                };
                list.appendChild(d);
            });
        }

        function sendMsg() {
            const val = document.getElementById('m-i').value;
            if(val && selectedFriend) { socket.emit('private_message', { to: selectedFriend, text: val, type: 'text' }); document.getElementById('m-i').value = ""; }
        }
        function sendFile(input) {
            const file = input.files[0];
            if(!file || !selectedFriend || file.size > 100*1024*1024) return;
            const r = new FileReader();
            r.onload = e => socket.emit('private_message', { to: selectedFriend, text: file.name, fileData: e.target.result, fileName: file.name, type: 'file' });
            r.readAsDataURL(file);
        }
        async function toggleMic() {
            const btn = document.getElementById('mic-btn');
            if(btn.style.background !== 'red') {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const r = new FileReader();
                    r.onload = e => socket.emit('private_message', { to: selectedFriend, text: "Голосовое", fileData: e.target.result, type: 'voice' });
                    r.readAsDataURL(blob); audioChunks = []; stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start(); btn.style.background = 'red';
            } else { mediaRecorder.stop(); btn.style.background = '#1a1a1a'; }
        }

        socket.on('private_message', m => { chatHistory.push(m); if(m.to===me) document.getElementById('msg-sound').play(); if(selectedFriend === m.from || selectedFriend === m.to) renderMessages(); });
        function deleteMsg(msgId) { socket.emit('delete_message', { msgId, to: selectedFriend }); }
        socket.on('message_deleted', msgId => { chatHistory = chatHistory.filter(m => m.id !== msgId); renderMessages(); });

        function renderMessages() {
            const box = document.getElementById('messages'); box.innerHTML = "";
            chatHistory.filter(m => (m.from===me && m.to===selectedFriend) || (m.from===selectedFriend && m.to===me)).forEach(m => {
                const w = document.createElement('div'); w.className = `msg-wrapper ${m.from===me?'sent-wrap':'rec-wrap'}`;
                let content = m.text;
                if(m.type === 'file') {
                    if(m.fileName.match(/\.(jpg|jpeg|png|gif)$i/)) { content = `<img src="${m.fileData}" style="max-width:200px;border-radius:10px">` }
                    else { content = `<a href="${m.fileData}" download="${m.fileName}" style="color:#3498db">📁 ${m.fileName}</a>`; }
                }
                if(m.type === 'voice') { content = `<audio controls src="${m.fileData}" style="height:35px; width:200px"></audio>`; }
                w.innerHTML = `<div class="msg ${m.from===me?'sent':'received'}">${content}</div><div class="msg-info"><span>${m.time}</span> ${m.from===me ? `<span class="del-btn" onclick="deleteMsg('${m.id}')">Удалить</span>` : ''}</div>`;
                box.appendChild(w);
            });
            box.scrollTo(0, box.scrollHeight);
        }

        socket.on('auth_error', e => alert(e));
        socket.on('register_success', () => alert("Аккаунт создан!"));
        document.getElementById('m-i').addEventListener('keypress', e => { if(e.key==='Enter') sendMsg(); });
        function goBack() { document.getElementById('sidebar').classList.remove('hidden'); }
    </script>
</body>
</html>
