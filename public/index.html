<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllWhite V3 - Premium</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #ff4d4d; --dark-red: #8b0000; --bg: #050505; --panel: rgba(20, 20, 20, 0.8); }
        
        * { box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; }
        
        /* Скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--dark-red); border-radius: 10px; }

        /* Авторизация */
        #auth-screen { position: fixed; inset: 0; background: url('https://w.wallhaven.cc/full/8o/wallhaven-8o999y.jpg') center/cover; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #auth-screen::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .auth-box { position: relative; background: var(--panel); padding: 40px; border-radius: 24px; width: 350px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; outline: none; }
        input:focus { border-color: var(--red); background: rgba(255,255,255,0.1); }
        
        .btn-main { width: 100%; padding: 14px; background: var(--dark-red); border: none; color: #fff; cursor: pointer; border-radius: 12px; font-weight: 600; font-size: 16px; margin-top: 10px; }
        .btn-main:hover { background: var(--red); box-shadow: 0 0 20px rgba(255,77,77,0.4); }

        /* Основной интерфейс */
        .sidebar { width: 320px; background: rgba(10,10,10,0.95); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #080808; }
        
        .sidebar-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .my-profile { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .avatar { width: 45px; height: 45px; border-radius: 15px; object-fit: cover; }
        
        .friend-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; position: relative; }
        .friend-item:hover { background: rgba(255,255,255,0.03); }
        .friend-item.active { background: rgba(255,77,77,0.1); border-left: 3px solid var(--red); }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #000; position: absolute; left: 60px; top: 45px; }

        #messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 65%; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .sent { align-self: flex-end; background: var(--dark-red); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #1a1a1a; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; opacity: 0.5; margin-top: 5px; text-align: right; }

        .input-box { padding: 20px 30px; background: rgba(15,15,15,0.9); display: flex; gap: 15px; align-items: center; }
        .input-box input { margin: 0; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--dark-red); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="color:var(--red); margin: 0 0 10px 0; font-size: 28px;">AllWhite</h1>
            <p style="color:#666; margin-bottom: 30px;">Войдите, чтобы продолжить</p>
            <input type="text" id="auth-n" placeholder="Логин">
            <input type="password" id="auth-p" placeholder="Пароль">
            <button class="btn-main" onclick="login()">Войти</button>
            <button class="btn-main" onclick="register()" style="background:transparent; border: 1px solid #333; margin-top: 15px;">Создать аккаунт</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="my-profile">
                <img id="my-av" src="" class="avatar">
                <b id="my-name" style="font-size: 18px;"></b>
            </div>
            <div style="display:flex; gap:10px">
                <input type="text" id="f-search" placeholder="Ник друга..." style="padding:10px; font-size:12px">
                <button onclick="addFriend()" class="circle-btn" style="width:40px; height:40px; font-size: 16px;">+</button>
            </div>
        </div>
        <div id="friend-list" style="overflow-y:auto; flex:1"></div>
    </div>

    <div class="chat-area">
        <div style="padding:20px 30px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600;" id="chat-h">Выберите диалог</div>
        <div id="messages"></div>
        <div class="input-box">
            <input type="text" id="m-i" placeholder="Введите сообщение...">
            <button class="circle-btn" onclick="sendMsg()">></button>
        </div>
    </div>

    <script>
        const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });
        let me = "", selectedFriend = "", friends = [], chatHistory = [];

        window.onload = () => {
            const n = localStorage.getItem('aw_n'), p = localStorage.getItem('aw_p');
            if(n && p) socket.emit('login', { username: n, password: p });
        };

        function login() {
            const u = document.getElementById('auth-n').value, p = document.getElementById('auth-p').value;
            if(!u || !p) return alert("Заполни все поля!");
            localStorage.setItem('aw_n', u); localStorage.setItem('aw_p', p);
            socket.emit('login', { username: u, password: p });
        }

        function register() {
            const u = document.getElementById('auth-n').value, p = document.getElementById('auth-p').value;
            socket.emit('register', { username: u, password: p });
        }

        function addFriend() {
            const n = document.getElementById('f-search').value;
            if(n) { socket.emit('add_friend', n); document.getElementById('f-search').value = ""; }
        }

        socket.on('login_success', data => {
            me = data.username; document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('my-name').innerText = me;
            document.getElementById('my-av').src = data.avatar;
            friends = data.friends; renderFriends();
        });

        socket.on('friend_added', f => { friends.push(f); renderFriends(); });
        
        socket.on('friend_status_change', data => {
            const f = friends.find(u => u.name === data.name);
            if(f) { f.online = data.online; renderFriends(); }
        });

        function renderFriends() {
            const list = document.getElementById('friend-list'); list.innerHTML = "";
            friends.forEach(f => {
                const d = document.createElement('div'); 
                d.className = `friend-item ${selectedFriend === f.name ? 'active' : ''}`;
                d.innerHTML = `
                    <img src="${f.avatar}" class="avatar">
                    <div class="status-dot" style="background:${f.online?'#2ecc71':'#555'}"></div>
                    <b>${f.name}</b>`;
                d.onclick = () => { selectedFriend = f.name; document.getElementById('chat-h').innerText = "@"+f.name; renderFriends(); renderMessages(); };
                list.appendChild(d);
            });
        }

        function sendMsg() {
            const val = document.getElementById('m-i').value;
            if(val && selectedFriend) {
                socket.emit('private_message', { to: selectedFriend, text: val });
                document.getElementById('m-i').value = "";
            }
        }

        socket.on('private_message', m => { chatHistory.push(m); renderMessages(); });

        function renderMessages() {
            const box = document.getElementById('messages'); box.innerHTML = "";
            chatHistory.filter(m => (m.from===me && m.to===selectedFriend) || (m.from===selectedFriend && m.to===me)).forEach(m => {
                const d = document.createElement('div'); d.className = `msg ${m.from===me?'sent':'received'}`;
                d.innerHTML = `<div>${m.text}</div><div class="msg-time">${m.time}</div>`;
                box.appendChild(d);
            });
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        socket.on('register_success', () => alert("Аккаунт создан! Теперь войдите."));
        socket.on('auth_error', e => alert(e));
        
        document.getElementById('m-i').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
