<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AllWhite V5.5 - Ultra Design</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #ff4d4d; --dark-red: #8b0000; --bg: #050505; }
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Inter', sans-serif; }
        
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; position: relative; }

        /* Тот самый дизайнерский фон */
        .blur-sphere { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.2; pointer-events: none; z-index: 1; animation: float 10s infinite alternate; }
        .sphere-1 { width: 400px; height: 400px; background: radial-gradient(circle, var(--red), var(--dark-red)); top: -100px; left: -100px; box-shadow: 0 0 100px rgba(255,0,0,0.3); }
        .sphere-2 { width: 500px; height: 500px; background: radial-gradient(circle, #ff2a2a, #440000); bottom: -150px; right: -150px; animation-delay: -5s; box-shadow: 0 0 120px rgba(255,0,0,0.2); }
        
        @keyframes float { 
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            100% { transform: translate(30px, 50px) scale(1.1); opacity: 0.3; }
        }

        /* Авторизация - ПРИОРИТЕТ ВЫШЕ ВСЕХ */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-box { position: relative; z-index: 10001; background: rgba(10,10,10,0.8); backdrop-filter: blur(30px); padding: 40px; border-radius: 30px; width: 90%; max-width: 360px; text-align: center; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .main-logo { font-size: 80px; font-weight: 900; color: transparent; -webkit-text-stroke: 2px #fff; filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); margin-bottom: 20px; letter-spacing: -5px; }

        input { width: 100%; padding: 14px; margin: 8px 0; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; outline: none; }
        input:focus { border-color: var(--red); box-shadow: 0 0 10px rgba(255,77,77,0.2); }
        .btn-main { width: 100%; padding: 14px; background: var(--dark-red); border: none; color: #fff; cursor: pointer; border-radius: 12px; font-weight: 600; margin-top: 10px; position: relative; z-index: 10002; }
        .btn-main:active { transform: scale(0.98); }

        /* Интерфейс приложения */
        .sidebar { width: 320px; background: rgba(8,8,8,0.9); border-right: 1px solid #151515; display: flex; flex-direction: column; z-index: 500; position: relative; backdrop-filter: blur(10px); }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: #030303; z-index: 400; }
        .chat-overlay { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent, #000 95%); pointer-events: none; z-index: 2; }

        .chat-header { padding: 15px 20px; border-bottom: 1px solid #151515; display: flex; align-items: center; gap: 15px; background: rgba(10,10,10,0.8); backdrop-filter: blur(15px); z-index: 5; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 3; }

        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative; max-width: 80%; }
        .sent { background: var(--dark-red); align-self: flex-end; border-bottom-right-radius: 4px; }
        .received { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }

        .input-box { padding: 15px 20px; background: rgba(10,10,10,0.95); display: flex; gap: 10px; border-top: 1px solid #151515; z-index: 10; align-items: center; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; background: #1a1a1a; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* Мобилка */
        @media (max-width: 768px) {
            .sidebar { position: absolute; width: 100%; height: 100%; }
            .sidebar.hidden { transform: translateX(-100%); }
            .back-btn { display: block !important; }
        }
        .back-btn { display: none; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }

        #profile-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <div class="blur-sphere sphere-1"></div>
    <div class="blur-sphere sphere-2"></div>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="main-logo">AW</div>
            <input type="text" id="auth-n" placeholder="Логин">
            <input type="password" id="auth-p" placeholder="Пароль">
            <button class="btn-main" onclick="login()">Войти</button>
            <button class="btn-main" onclick="register()" style="background:transparent; border: 1px solid #333">Регистрация</button>
        </div>
    </div>

    <div id="profile-modal">
        <div style="background:#111; padding:30px; border-radius:25px; width:320px; text-align:center; border:1px solid #333">
            <img id="modal-av" src="" style="width:100px; height:100px; border-radius:20px; object-fit:cover; margin-bottom:15px">
            <input type="file" id="av-upload" style="display:none" onchange="uploadAvatar(this)" accept="image/*">
            <button class="btn-main" onclick="document.getElementById('av-upload').click()" style="background:#222; font-size:12px">Сменить аватар</button>
            <input type="text" id="newName-input" placeholder="Новый ник">
            <input type="text" id="bio-input" placeholder="Статус">
            <div style="display:flex; gap:10px; margin-top:20px">
                <button class="btn-main" onclick="saveProfile()" style="margin:0">ОК</button>
                <button class="btn-main" onclick="document.getElementById('profile-modal').style.display='none'" style="margin:0; background:#333">Отмена</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="padding:20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #151515; cursor:pointer" onclick="openProfile()">
            <img id="my-av" src="" style="width:45px; height:45px; border-radius:12px; object-fit:cover">
            <div><b id="my-name"></b><div id="my-bio" style="font-size:11px;color:#888"></div></div>
        </div>
        <div style="padding:15px; display:flex; gap:10px; border-bottom:1px solid #151515">
            <input type="text" id="f-search" placeholder="Поиск друга..." style="margin:0">
            <button onclick="addFriend()" class="circle-btn" style="width:40px; height:40px">+</button>
        </div>
        <div id="friend-list" style="overflow-y:auto; flex:1"></div>
    </div>

    <div class="chat-area">
        <div class="chat-overlay"></div>
        <div class="chat-header">
            <button class="back-btn" onclick="document.getElementById('sidebar').classList.remove('hidden')">❮</button>
            <b id="chat-h">Выберите диалог</b>
        </div>
        <div id="messages"></div>
        <div class="input-box" id="inp-box" style="display:none">
            <button class="circle-btn" onclick="document.getElementById('file-in').click()">📎</button>
            <input type="file" id="file-in" style="display:none" onchange="sendFile(this)">
            <input type="text" id="m-i" placeholder="Сообщение..." style="margin:0; flex:1">
            <button class="circle-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
            <button class="circle-btn" style="background:var(--dark-red)" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });
        let me = "", selectedFriend = "", friends = [], chatHistory = [], mediaRecorder, chunks = [];

        function login() {
            const u = document.getElementById('auth-n').value, p = document.getElementById('auth-p').value;
            if(!u || !p) return;
            localStorage.setItem('aw_n', u); localStorage.setItem('aw_p', p);
            socket.emit('login', { username: u, password: p });
        }
        function register() { socket.emit('register', { username: document.getElementById('auth-n').value, password: document.getElementById('auth-p').value }); }
        
        window.onload = () => {
            const n = localStorage.getItem('aw_n'), p = localStorage.getItem('aw_p');
            if(n && p) socket.emit('login', { username: n, password: p });
        };

        socket.on('login_success', data => {
            me = data.username; document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('my-name').innerText = me;
            document.getElementById('my-av').src = data.avatar;
            document.getElementById('my-bio').innerText = data.bio;
            friends = data.friends; chatHistory = data.history; renderFriends();
        });

        // Работа с профилем
        let tempAv = "";
        function openProfile() {
            document.getElementById('profile-modal').style.display = 'flex';
            document.getElementById('modal-av').src = document.getElementById('my-av').src;
            document.getElementById('newName-input').value = me;
            document.getElementById('bio-input').value = document.getElementById('my-bio').innerText;
        }
        function uploadAvatar(input) {
            const f = input.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = e => { tempAv = e.target.result; document.getElementById('modal-av').src = tempAv; };
            r.readAsDataURL(f);
        }
        function saveProfile() {
            socket.emit('update_profile', { avatar: tempAv || undefined, bio: document.getElementById('bio-input').value, newName: document.getElementById('newName-input').value });
            document.getElementById('profile-modal').style.display = 'none';
        }
        socket.on('profile_updated', data => {
            if(data.newName) { me = data.newName; localStorage.setItem('aw_n', me); document.getElementById('my-name').innerText = me; }
            if(data.avatar) document.getElementById('my-av').src = data.avatar;
            document.getElementById('my-bio').innerText = data.bio;
        });

        function addFriend() { const n = document.getElementById('f-search').value; if(n) socket.emit('add_friend', n); }
        socket.on('friend_added', f => { friends.push(f); renderFriends(); });
        socket.on('friend_updated', d => {
            const f = friends.find(u => u.name === d.name);
            if(f) { f.online = d.online; renderFriends(); }
        });

        function renderFriends() {
            const list = document.getElementById('friend-list'); list.innerHTML = "";
            friends.forEach(f => {
                const d = document.createElement('div'); d.style = "padding:15px 20px; display:flex; align-items:center; gap:12px; cursor:pointer; border-bottom:1px solid #111";
                d.innerHTML = `<img src="${f.avatar}" style="width:42px;height:42px;border-radius:10px;object-fit:cover"> <b>${f.name}</b> <span style="color:${f.online?'#2ecc71':'#333'}; margin-left:auto">●</span>`;
                d.onclick = () => {
                    selectedFriend = f.name; document.getElementById('chat-h').innerText = f.name;
                    document.getElementById('inp-box').style.display = 'flex';
                    if(window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hidden');
                    renderMessages();
                };
                list.appendChild(d);
            });
        }

        function sendMsg() {
            const i = document.getElementById('m-i');
            if(i.value && selectedFriend) { socket.emit('private_message', { to: selectedFriend, text: i.value, type: 'text' }); i.value = ""; }
        }
        function sendFile(input) {
            const f = input.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = e => socket.emit('private_message', { to: selectedFriend, text: f.name, fileData: e.target.result, fileName: f.name, type: 'file' });
            r.readAsDataURL(f);
        }

        socket.on('private_message', m => {
            chatHistory.push(m);
            if(m.to===me) document.getElementById('msg-sound').play();
            if(selectedFriend === m.from || selectedFriend === m.to) renderMessages();
        });

        function renderMessages() {
            const box = document.getElementById('messages'); box.innerHTML = "";
            chatHistory.filter(m => (m.from===me && m.to===selectedFriend) || (m.from===selectedFriend && m.to===me)).forEach(m => {
                const w = document.createElement('div'); w.style = `display:flex; flex-direction:column; ${m.from===me?'align-self:flex-end':'align-self:flex-start'}`;
                let content = m.text;
                if(m.type === 'file') {
                    if(m.fileName.match(/\.(jpg|jpeg|png|gif)$/i)) content = `<img src="${m.fileData}" style="max-width:200px; border-radius:10px">`;
                    else content = `<a href="${m.fileData}" download="${m.fileName}" style="color:#3498db">📁 ${m.fileName}</a>`;
                }
                if(m.type === 'voice') content = `<audio controls src="${m.fileData}" style="height:35px; width:180px"></audio>`;
                w.innerHTML = `<div class="msg ${m.from===me?'sent':'received'}">${content}</div><div style="font-size:9px; opacity:0.5; margin-top:3px; text-align:right">${m.time}</div>`;
                box.appendChild(w);
            });
            box.scrollTo(0, box.scrollHeight);
        }

        async function toggleMic() {
            const b = document.getElementById('mic-btn');
            if(b.style.background !== 'red') {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s);
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const bl = new Blob(chunks, { type: 'audio/webm' });
                    const r = new FileReader();
                    r.onload = e => socket.emit('private_message', { to: selectedFriend, text: "Голосовое", fileData: e.target.result, type: 'voice' });
                    r.readAsDataURL(bl); chunks = []; s.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start(); b.style.background = 'red';
            } else { mediaRecorder.stop(); b.style.background = '#1a1a1a'; }
        }

        document.getElementById('m-i').addEventListener('keypress', e => { if(e.key==='Enter') sendMsg(); });
        socket.on('auth_error', e => alert(e));
        socket.on('register_success', () => alert("Аккаунт готов!"));
    </script>
</body>
</html>
