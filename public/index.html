<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AllWhite V3 - Friends</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #8b0000; --bg: #0a0a0a; --panel: #141414; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: #fff; display: flex; height: 100vh; }
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-box { background: var(--panel); padding: 30px; border-radius: 12px; width: 300px; text-align: center; border: 1px solid #222; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px; outline: none; }
        button { padding: 10px; background: var(--red); border: none; color: #fff; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .friend-item { padding: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-bottom: 1px solid #1a1a1a; }
        .friend-item:hover { background: #1f1f1f; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #333; }
        .status { width: 10px; height: 10px; border-radius: 50%; margin-left: -18px; margin-top: 28px; border: 2px solid var(--panel); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; max-width: 60%; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--red); }
        .received { align-self: flex-start; background: #222; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color:var(--red)">AllWhite</h2>
            <input type="text" id="auth-n" placeholder="Логин">
            <input type="password" id="auth-p" placeholder="Пароль">
            <button onclick="login()" style="width:100%">Войти</button>
            <p onclick="register()" style="font-size:12px; cursor:pointer; color:#444; margin-top:10px">Регистрация</p>
        </div>
    </div>

    <div class="sidebar">
        <div style="padding:15px; border-bottom:1px solid #222; display:flex; align-items:center; gap:10px">
            <img id="my-av" src="" class="avatar">
            <b id="my-name"></b>
        </div>
        <div style="padding:10px; border-bottom:1px solid #222">
            <input type="text" id="friend-search" placeholder="Добавить друга по нику..." style="width:75%; margin:0; font-size:12px">
            <button onclick="addFriend()" style="width:20%; padding:8px">+</button>
        </div>
        <div id="friend-list"></div>
    </div>

    <div class="chat-area">
        <div id="chat-header" style="padding:15px; background:var(--panel); border-bottom:1px solid #222">Выберите друга</div>
        <div id="messages"></div>
        <div style="padding:20px; background:var(--panel); display:flex; gap:10px">
            <input type="text" id="m-i" placeholder="Сообщение..." style="margin:0; flex:1">
            <button onclick="sendMsg()" style="width:50px; margin:0">></button>
        </div>
    </div>

    <script>
        const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });
        let me = "", selectedFriend = "", friends = [], chatHistory = [];

        // АВТО-ВХОД
        window.onload = () => {
            const n = localStorage.getItem('aw_n'), p = localStorage.getItem('aw_p');
            if(n && p) socket.emit('login', { username: n, password: p });
        };

        function login() {
            const u = document.getElementById('auth-n').value, p = document.getElementById('auth-p').value;
            localStorage.setItem('aw_n', u); localStorage.setItem('aw_p', p);
            socket.emit('login', { username: u, password: p });
        }

        function register() {
            socket.emit('register', { username: document.getElementById('auth-n').value, password: document.getElementById('auth-p').value });
        }

        function addFriend() {
            const n = document.getElementById('friend-search').value;
            if(n) { socket.emit('add_friend', n); document.getElementById('friend-search').value = ""; }
        }

        socket.on('login_success', data => {
            me = data.username; document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('my-name').innerText = me;
            document.getElementById('my-av').src = data.avatar;
            friends = data.friends; renderFriends();
        });

        socket.on('friend_added', f => { friends.push(f); renderFriends(); });
        
        socket.on('friend_status_change', data => {
            const f = friends.find(u => u.name === data.name);
            if(f) { f.online = data.online; renderFriends(); }
        });

        function renderFriends() {
            const list = document.getElementById('friend-list'); list.innerHTML = "";
            friends.forEach(f => {
                const d = document.createElement('div'); d.className = "friend-item";
                d.innerHTML = `
                    <img src="${f.avatar}" class="avatar">
                    <div class="status" style="background:${f.online?'#2ecc71':'#555'}"></div>
                    <b>${f.name}</b>`;
                d.onclick = () => { selectedFriend = f.name; document.getElementById('chat-header').innerText = "@"+f.name; renderMessages(); };
                list.appendChild(d);
            });
        }

        function sendMsg() {
            const val = document.getElementById('m-i').value;
            if(val && selectedFriend) {
                const msg = { to: selectedFriend, text: val };
                socket.emit('private_message', msg);
                document.getElementById('m-i').value = "";
            }
        }

        socket.on('private_message', m => { chatHistory.push(m); renderMessages(); });

        function renderMessages() {
            const box = document.getElementById('messages'); box.innerHTML = "";
            chatHistory.filter(m => (m.from===me && m.to===selectedFriend) || (m.from===selectedFriend && m.to===me)).forEach(m => {
                const d = document.createElement('div'); d.className = `msg ${m.from===me?'sent':'received'}`;
                d.innerText = m.text; box.appendChild(d);
            });
            box.scrollTo(0, box.scrollHeight);
        }

        socket.on('register_success', () => alert("Аккаунт создан!"));
        socket.on('auth_error', e => alert(e));
    </script>
</body>
</html>
