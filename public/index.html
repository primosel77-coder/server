<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AllWhite FULL V6</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #ff4d4d; --dark-red: #8b0000; --bg: #050505; --panel: rgba(20, 20, 20, 0.95); }
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; position: relative; }
        
        /* Стили скроллбара как у тебя */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--dark-red); border-radius: 10px; }

        /* Живой фон сферы */
        .blur-sphere { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none; z-index: 0; animation: pulse 8s infinite alternate; }
        .sphere-1 { width: 300px; height: 300px; background: var(--dark-red); top: -50px; left: -50px; }
        .sphere-2 { width: 400px; height: 400px; background: #ff2a2a; bottom: -50px; right: -50px; animation-delay: -4s; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.15; } to { transform: scale(1.15); opacity: 0.25; } }

        /* Авторизация ( гарантированно сверху) */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-box { position: relative; z-index: 10001; background: rgba(10,10,10,0.6); backdrop-filter: blur(25px); padding: 40px; border-radius: 30px; width: 90%; max-width: 360px; text-align: center; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .main-logo { font-size: 80px; font-weight: 900; color: transparent; -webkit-text-stroke: 1.5px #fff; filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); margin-bottom: 20px; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; outline: none; }
        input:focus { border-color: var(--red); }
        .btn-main { width: 100%; padding: 14px; background: var(--dark-red); border: none; color: #fff; cursor: pointer; border-radius: 12px; font-weight: 600; font-size: 16px; margin-top: 10px; z-index: 10002; }

        /* ТВОЙ СТАРЫЙ, КРАСИВЫЙ CSS ДЛЯ ЧАТА */
        .sidebar { width: 280px; background: #0a0a0a; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; z-index: 100; flex-shrink: 0; }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: #050505; z-index: 10; }
        .chat-overlay { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent, #000 98%); pointer-events: none; z-index: 1; }

        .chat-header { padding: 12px 18px; border-bottom: 1px solid #151515; display: flex; align-items: center; gap: 12px; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); z-index: 5; height: 60px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 2; padding-bottom: 80px; }
        
        .msg-wrapper { max-width: 80%; display: flex; flex-direction: column; }
        .sent-wrap { align-self: flex-end; } .rec-wrap { align-self: flex-start; }
        .msg { padding: 10px 14px; border-radius: 16px; font-size: 14px; box-shadow: 0 3px 10px rgba(0,0,0,0.2); }
        .sent { background: var(--dark-red); border-bottom-right-radius: 2px; }
        .received { background: #1a1a1a; border-bottom-left-radius: 2px; }
        .msg-info { font-size: 9px; opacity: 0.5; margin-top: 3px; display: flex; justify-content: flex-end; gap: 8px; align-items: center; }

        /* Поле ввода */
        .input-box { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 15px; background: rgba(10,10,10,0.98); display: flex; gap: 8px; align-items: center; border-top: 1px solid #1a1a1a; z-index: 20; }
        .circle-btn { width: 40px; height: 40px; border-radius: 50%; background: #1a1a1a; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ (улучшенная) */
        @media (max-width: 768px) {
            .sidebar { position: absolute; width: 100%; height: 100%; transition: 0.3s ease; }
            .sidebar.hidden { transform: translateX(-100%); }
            .chat-area { width: 100%; }
            .back-btn { display: block !important; }
        }
        .back-btn { display: none; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 0 5px; }

        /* Модалка профиля */
        #profile-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; border: 1px solid #333; }
        .avatar { object-fit: cover; background: #222; }
    </style>
</head>
<body>
    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
    <div class="blur-sphere sphere-1"></div>
    <div class="blur-sphere sphere-2"></div>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="main-logo">AW</div>
            <input type="text" id="auth-n" placeholder="Логин">
            <input type="password" id="auth-p" placeholder="Пароль">
            <button type="button" class="btn-main" onclick="login()">Войти</button>
            <button type="button" class="btn-main" onclick="register()" style="background:transparent; border: 1px solid #333">Регистрация</button>
        </div>
    </div>

    <div id="profile-modal">
        <div class="modal-content">
            <h3 style="margin:0 0 15px 0">Профиль</h3>
            <img id="modal-av" src="" class="avatar" style="width:90px; height:90px; border-radius:15px; margin-bottom:10px">
            <input type="file" id="av-upload" style="display:none" onchange="uploadAvatar(this)" accept="image/*">
            <button class="btn-main" onclick="document.getElementById('av-upload').click()" style="background:#222; margin-bottom:10px; font-size:12px">Выбрать фото</button>
            <input type="text" id="bio-input" placeholder="Статус...">
            <div style="display:flex; gap:10px; margin-top:15px">
                <button class="btn-main" onclick="saveProfile()" style="margin:0">Ок</button>
                <button class="btn-main" onclick="document.getElementById('profile-modal').style.display='none'" style="margin:0; background:#333">Отмена</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="padding:15px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #1a1a1a; cursor:pointer" onclick="openProfile()">
            <img id="my-av" src="" class="avatar" style="width:45px; height:45px; border-radius:12px">
            <div><b id="my-name"></b><div id="my-bio" style="font-size:11px;color:#888"></div></div>
        </div>
        <div style="padding:12px; display:flex; gap:8px; border-bottom:1px solid #1a1a1a">
            <input type="text" id="f-search" placeholder="Поиск друга..." style="margin:0; font-size:13px">
            <button onclick="addFriend()" class="circle-btn" style="width:38px; height:38px">+</button>
        </div>
        <div id="friend-list" style="overflow-y:auto; flex:1"></div>
    </div>

    <div class="chat-area">
        <div class="chat-overlay"></div>
        <div class="chat-header">
            <button class="back-btn" onclick="goBack()">❮</button>
            <div id="chat-h-box" style="display:none; align-items:center; gap:10px">
                <b id="chat-h">Чат</b>
            </div>
            <b id="chat-placeholder" style="opacity:0.5">Выберите друга</b>
        </div>
        <div id="messages"></div>
        
        <div class="input-box" id="inp-box" style="display:none">
            <button type="button" class="circle-btn" onclick="document.getElementById('file-in').click()">📎</button>
            <input type="file" id="file-in" style="display:none" onchange="sendFile(this)">
            <input type="text" id="m-i" placeholder="Сообщение..." style="margin:0; flex:1">
            <button type="button" class="circle-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
            <button type="button" class="circle-btn" style="background:var(--dark-red)" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });
        let me = "", selectedFriend = "", friends = [], chatHistory = [], mediaRecorder, audioChunks = [];

        function login() {
            const u = document.getElementById('auth-n').value, p = document.getElementById('auth-p').value;
            localStorage.setItem('aw_n', u); localStorage.setItem('aw_p', p);
            socket.emit('login', { username: u, password: p });
        }
        function register() { socket.emit('register', { username: document.getElementById('auth-n').value, password: document.getElementById('auth-p').value }); }
        
        window.onload = () => {
            const n = localStorage.getItem('aw_n'), p = localStorage.getItem('aw_p');
            if(n && p) socket.emit('login', { username: n, password: p });
            if(window.innerWidth <= 768) goBack(); 
        };

        socket.on('login_success', data => {
            me = data.username; document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('my-name').innerText = me;
            document.getElementById('my-av').src = data.avatar;
            document.getElementById('my-bio').innerText = data.bio;
            friends = data.friends; chatHistory = data.history; renderFriends();
        });

        let tempAv = "";
        function openProfile() {
            document.getElementById('profile-modal').style.display = 'flex';
            document.getElementById('modal-av').src = document.getElementById('my-av').src;
            document.getElementById('bio-input').value = document.getElementById('my-bio').innerText;
        }
        function uploadAvatar(input) {
            const file = input.files[0];
            if(file && file.size < 2000000) {
                const r = new FileReader();
                r.onload = e => { tempAv = e.target.result; document.getElementById('modal-av').src = tempAv; };
                r.readAsDataURL(file);
            }
        }
        function saveProfile() {
            socket.emit('update_profile', { avatar: tempAv || undefined, bio: document.getElementById('bio-input').value });
            document.getElementById('profile-modal').style.display = 'none';
        }
        socket.on('profile_updated', data => {
            if(data.avatar) document.getElementById('my-av').src = data.avatar;
            document.getElementById('my-bio').innerText = data.bio;
        });

        function addFriend() { const n = document.getElementById('f-search').value; if(n) socket.emit('add_friend', n); }
        socket.on('friend_added', f => { friends.push(f); renderFriends(); });

        function renderFriends() {
            const list = document.getElementById('friend-list'); list.innerHTML = "";
            friends.forEach(f => {
                const d = document.createElement('div'); d.style = "padding:12px 18px; display:flex; align-items:center; gap:12px; cursor:pointer; border-bottom:1px solid #111";
                d.innerHTML = `<img src="${f.avatar}" class="avatar" style="width:42px;height:42px;border-radius:10px"> <b>${f.name}</b> <span style="color:${f.online?'#2ecc71':'#333'}; margin-left:auto">●</span>`;
                d.onclick = () => selectFriend(f.name); list.appendChild(d);
            });
        }

        function selectFriend(name) {
            selectedFriend = name;
            document.getElementById('chat-placeholder').style.display = 'none';
            document.getElementById('chat-h-box').style.display = 'flex';
            document.getElementById('chat-h').innerText = name;
            document.getElementById('inp-box').style.display = 'flex';
            if(window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hidden');
            renderMessages();
        }
        function goBack() { document.getElementById('sidebar').classList.remove('hidden'); }

        function sendMsg() {
            const i = document.getElementById('m-i');
            if(i.value && selectedFriend) { socket.emit('private_message', { to: selectedFriend, text: i.value, type: 'text' }); i.value = ""; }
        }
        function sendFile(input) {
            const file = input.files[0]; if(!file) return;
            const r = new FileReader();
            r.onload = e => socket.emit('private_message', { to: selectedFriend, text: file.name, fileData: e.target.result, fileName: file.name, type: 'file' });
            r.readAsDataURL(file);
        }
        socket.on('private_message', m => {
            chatHistory.push(m); if(m.to===me) document.getElementById('msg-sound').play();
            if(selectedFriend === m.from || selectedFriend === m.to) renderMessages();
        });
        socket.on('message_deleted', id => { chatHistory = chatHistory.filter(m => m.id !== id); renderMessages(); });

        function renderMessages() {
            const box = document.getElementById('messages'); box.innerHTML = "";
            chatHistory.filter(m => (m.from===me && m.to===selectedFriend) || (m.from===selectedFriend && m.to===me)).forEach(m => {
                const w = document.createElement('div'); w.className = `msg-wrapper ${m.from===me?'sent-wrap':'rec-wrap'}`;
                let content = m.text;
                if(m.type === 'file') {
                    if(m.fileName.match(/\.(jpg|jpeg|png|gif)$/i)) content = `<img src="${m.fileData}" style="max-width:100%; border-radius:10px">`;
                    else content = `<a href="${m.fileData}" download="${m.fileName}" style="color:#3498db">📁 ${m.fileName}</a>`;
                }
                if(m.type === 'voice') content = `<audio controls src="${m.fileData}" style="width:180px;height:35px"></audio>`;
                w.innerHTML = `<div class="msg ${m.from===me?'sent':'received'}">${content}</div>
                <div class="msg-info"><span>${m.time}</span> ${m.from===me?`<span style="color:red;cursor:pointer" onclick="socket.emit('delete_message',{msgId:'${m.id}',to:'${selectedFriend}'})">×</span>`:''}</div>`;
                box.appendChild(w);
            });
            box.scrollTo(0, box.scrollHeight);
        }

        async function toggleMic() {
            const btn = document.getElementById('mic-btn');
            if(btn.style.background !== 'red') {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const r = new FileReader();
                    r.onload = e => socket.emit('private_message', { to: selectedFriend, text: "Голосовое", fileData: e.target.result, type: 'voice' });
                    r.readAsDataURL(blob); audioChunks = []; stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start(); btn.style.background = 'red';
            } else { mediaRecorder.stop(); btn.style.background = '#1a1a1a'; }
        }
        document.getElementById('m-i').addEventListener('keypress', e => { if(e.key==='Enter') sendMsg(); });
        socket.on('auth_error', e => alert(e));
        socket.on('register_success', () => alert("Аккаунт готов!"));
    </script>
</body>
</html>
