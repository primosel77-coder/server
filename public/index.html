<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AllWhite V3</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #8b0000; --bg: #0a0a0a; --panel: #141414; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { background: var(--panel); padding: 30px; border-radius: 12px; width: 300px; text-align: center; border: 1px solid #222; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: var(--red); border: none; color: #fff; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #chat-screen { display: none; width: 100%; height: 100vh; flex-direction: column; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color:var(--red)">AllWhite</h2>
            <input type="text" id="auth-n" placeholder="Логин">
            <input type="password" id="auth-p" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
            <button id="regBtn" style="background:#333; margin-top:5px">Регистрация</button>
        </div>
    </div>

    <div id="chat-screen">
        <div style="padding:20px; border-bottom:1px solid #222">
            Вы вошли как: <b id="my-name"></b>
        </div>
        <div id="messages" style="flex:1; overflow-y:auto; padding:20px"></div>
        <div style="padding:20px; display:flex; gap:10px">
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <button id="sendBtn" style="width:80px">></button>
        </div>
    </div>

    <script>
        // Принудительно подключаемся к Socket.io
        const socket = io();

        // Функции вынесены отдельно, чтобы кнопки их точно видели
        document.getElementById('loginBtn').onclick = function() {
            const u = document.getElementById('auth-n').value;
            const p = document.getElementById('auth-p').value;
            if(!u || !p) return alert("Заполни поля!");
            console.log("Жму вход:", u);
            socket.emit('login', { username: u, password: p });
        };

        document.getElementById('regBtn').onclick = function() {
            const u = document.getElementById('auth-n').value;
            const p = document.getElementById('auth-p').value;
            if(!u || !p) return alert("Заполни поля!");
            socket.emit('register', { username: u, password: p });
        };

        socket.on('login_success', (data) => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('my-name').innerText = data.username;
        });

        socket.on('auth_error', (err) => alert(err));
        socket.on('register_success', () => alert("Готово! Теперь жми Войти"));
    </script>
</body>
</html>
