<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AllWhite V5.2</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #ff4d4d; --dark-red: #8b0000; --bg: #050505; }
        * { box-sizing: border-box; transition: 0.2s; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; }

        /* Дизайн входа */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .blur-sphere { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; z-index: 0; }
        .auth-box { position: relative; z-index: 2; background: rgba(15,15,15,0.6); backdrop-filter: blur(30px); padding: 40px; border-radius: 30px; width: 90%; max-width: 360px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .main-logo { font-size: 80px; font-weight: 900; color: transparent; -webkit-text-stroke: 2px #fff; filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); margin-bottom: 20px; }

        input { width: 100%; padding: 14px; margin: 8px 0; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; outline: none; }
        .btn-main { width: 100%; padding: 14px; background: var(--dark-red); border: none; color: #fff; cursor: pointer; border-radius: 12px; font-weight: 600; margin-top: 10px; }

        /* Интерфейс */
        .sidebar { width: 320px; background: #080808; border-right: 1px solid #151515; display: flex; flex-direction: column; z-index: 10; }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: #030303; }
        .chat-overlay { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent, #000 95%); pointer-events: none; z-index: 1; }

        .chat-header { padding: 15px 20px; border-bottom: 1px solid #151515; display: flex; align-items: center; gap: 15px; background: rgba(10,10,10,0.8); backdrop-filter: blur(15px); z-index: 5; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2; }

        /* Сообщения и галочки */
        .msg-wrapper { max-width: 75%; display: flex; flex-direction: column; position: relative; }
        .sent-wrap { align-self: flex-end; } .rec-wrap { align-self: flex-start; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .sent { background: var(--dark-red); border-bottom-right-radius: 4px; }
        .received { background: #1a1a1a; border-bottom-left-radius: 4px; }
        .msg-info { font-size: 10px; opacity: 0.6; margin-top: 4px; display: flex; justify-content: flex-end; gap: 5px; }
        .read-icon { color: #3498db; font-weight: bold; }

        .input-box { padding: 15px 20px; background: rgba(10,10,10,0.95); display: flex; gap: 10px; border-top: 1px solid #151515; z-index: 5; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; background: #1a1a1a; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) { .sidebar { width: 100%; position: absolute; height: 100%; } .sidebar.hidden { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <div id="auth-screen">
        <div class="blur-sphere" style="width:400px; height:400px; background:var(--dark-red); top:-10%; left:-10%"></div>
        <div class="auth-box">
            <div class="main-logo">AW</div>
            <input type="text" id="auth-n" placeholder="Логин">
            <input type="password" id="auth-p" placeholder="Пароль">
            <button class="btn-main" onclick="login()">Войти</button>
            <button class="btn-main" onclick="register()" style="background:transparent; border: 1px solid #333">Регистрация</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="padding:20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #151515">
            <img id="my-av" src="" style="width:45px; height:45px; border-radius:12px; background:#222">
            <b id="my-name"></b>
        </div>
        <div style="padding:15px; display:flex; gap:10px; border-bottom:1px solid #151515">
            <input type="text" id="f-search" placeholder="Ник друга..." style="margin:0">
            <button onclick="addFriend()" class="circle-btn" style="min-width:40px; height:40px">+</button>
        </div>
        <div id="friend-list" style="flex:1; overflow-y:auto"></div>
    </div>

    <div class="chat-area">
        <div class="blur-sphere" style="width:500px; height:500px; background:#300; bottom:-10%; right:-10%"></div>
        <div class="chat-overlay"></div>
        <div class="chat-header">
            <button onclick="document.getElementById('sidebar').classList.remove('hidden')" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer">❮</button>
            <div>
                <b id="chat-h">Выберите диалог</b><br>
                <span id="typing-status" style="font-size:11px; color:var(--red); height:14px; display:block"></span>
            </div>
        </div>
        <div id="messages"></div>
        <div class="input-box" id="inp-box" style="display:none">
            <input type="text" id="m-i" placeholder="Сообщение..." style="margin:0">
            <button class="circle-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
            <button class="circle-btn" style="background:var(--dark-red)" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        const socket = io(window.location.origin, { transports: ['websocket'] });
        let me = "", selectedFriend = "", friends = [], chatHistory = [], typingTimeout;

        function login() {
            const u = document.getElementById('auth-n').value, p = document.getElementById('auth-p').value;
            localStorage.setItem('aw_n', u); localStorage.setItem('aw_p', p);
            socket.emit('login', { username: u, password: p });
        }
        function register() { socket.emit('register', { username: document.getElementById('auth-n').value, password: document.getElementById('auth-p').value }); }
        
        window.onload = () => {
            const n = localStorage.getItem('aw_n'), p = localStorage.getItem('aw_p');
            if(n && p) socket.emit('login', { username: n, password: p });
        };

        socket.on('register_success', () => alert("Готово! Войдите."));
        socket.on('auth_error', e => alert(e));

        socket.on('login_success', data => {
            me = data.username; document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('my-name').innerText = me;
            document.getElementById('my-av').src = data.avatar;
            friends = data.friends; chatHistory = data.history; renderFriends();
        });

        function addFriend() {
            const n = document.getElementById('f-search').value;
            if(n) { socket.emit('add_friend', n); document.getElementById('f-search').value = ""; }
        }

        socket.on('friend_added', f => { friends.push(f); renderFriends(); });

        function renderFriends() {
            const list = document.getElementById('friend-list'); list.innerHTML = "";
            friends.forEach(f => {
                const d = document.createElement('div');
                d.style = "padding:15px 20px; display:flex; align-items:center; gap:12px; cursor:pointer; border-bottom:1px solid #111; position:relative; z-index:2";
                d.innerHTML = `<img src="${f.avatar}" style="width:40px;height:40px;border-radius:10px"> <b>${f.name}</b> <span style="color:${f.online?'#2ecc71':'#555'}; margin-left:auto">●</span>`;
                d.onclick = () => {
                    selectedFriend = f.name;
                    document.getElementById('chat-h').innerText = f.name;
                    document.getElementById('inp-box').style.display = 'flex';
                    if(window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hidden');
                    socket.emit('mark_read', { friend: selectedFriend });
                    renderMessages();
                };
                list.appendChild(d);
            });
        }

        // ПЕЧАТАЕТ...
        document.getElementById('m-i').addEventListener('input', () => {
            if(selectedFriend) {
                socket.emit('typing', { to: selectedFriend });
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => socket.emit('stop_typing', { to: selectedFriend }), 2000);
            }
        });

        socket.on('user_typing', d => { if(d.from === selectedFriend) document.getElementById('typing-status').innerText = "печатает..."; });
        socket.on('user_stop_typing', d => { if(d.from === selectedFriend) document.getElementById('typing-status').innerText = ""; });

        function sendMsg() {
            const i = document.getElementById('m-i');
            if(i.value && selectedFriend) {
                socket.emit('stop_typing', { to: selectedFriend });
                socket.emit('private_message', { to: selectedFriend, text: i.value, type: 'text' });
                i.value = "";
            }
        }

        socket.on('private_message', m => {
            chatHistory.push(m);
            if(m.to === me) {
                document.getElementById('msg-sound').play();
                if(selectedFriend === m.from) socket.emit('mark_read', { friend: selectedFriend });
            }
            if(selectedFriend === m.from || selectedFriend === m.to) renderMessages();
        });

        socket.on('messages_read_by_friend', d => {
            if(d.by === selectedFriend) {
                chatHistory.forEach(m => { if(m.to === d.by) m.read = true; });
                renderMessages();
            }
        });

        function renderMessages() {
            const box = document.getElementById('messages'); box.innerHTML = "";
            chatHistory.filter(m => (m.from===me && m.to===selectedFriend) || (m.from===selectedFriend && m.to===me)).forEach(m => {
                const w = document.createElement('div'); w.className = `msg-wrapper ${m.from===me?'sent-wrap':'rec-wrap'}`;
                let content = m.type === 'voice' ? `<audio controls src="${m.fileData}" style="height:35px; width:200px"></audio>` : m.text;
                let status = m.from === me ? `<span class="read-icon">${m.read ? '✓✓' : '✓'}</span>` : '';
                w.innerHTML = `<div class="msg ${m.from===me?'sent':'received'}">${content}</div><div class="msg-info"><span>${m.time}</span> ${status}</div>`;
                box.appendChild(w);
            });
            box.scrollTo(0, box.scrollHeight);
        }

        // ГОЛОСОВЫЕ ФИКС
        let mediaRecorder, chunks = [];
        async function toggleMic() {
            const btn = document.getElementById('mic-btn');
            if(btn.style.background !== 'red') {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s);
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const b = new Blob(chunks, { type: 'audio/webm' });
                    const r = new FileReader();
                    r.onload = e => socket.emit('private_message', { to: selectedFriend, text: "Голосовое", fileData: e.target.result, type: 'voice' });
                    r.readAsDataURL(b); chunks = []; s.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start(); btn.style.background = 'red';
            } else {
                mediaRecorder.stop(); btn.style.background = '#1a1a1a';
            }
        }

        document.getElementById('m-i').addEventListener('keypress', e => { if(e.key==='Enter') sendMsg(); });
    </script>
</body>
</html>
